          - generic [ref=f20e240]:
            - paragraph [ref=f20e241]: There are dozens of Dan Cong cultivars all with their unique flavour profiles. The Ya Shi (Duck Sh*t) cultivar is one of the most delicious that we have tasted and despite its price we had to get a tiny quantity in for all the true tea lovers out there.
            - paragraph [ref=f20e242]:
              - text: This video is an extract from a
              - link "longer tasting session" [ref=f20e243] [cursor=pointer]:
                - /url: /article/tasting-four-dancongs
              - text: .
            - paragraph [ref=f20e244]
            - paragraph [ref=f20e246]: First, let's get the name out of the way! The story is that farmers discovered a tea cultivar in Ping Keng Tou village producing a unique and delicious taste and did not want this cultivar to be exploited by other farmers. So they made up stories that the earth in this area (which is a light, yellow brown colour) was covered in a lot of duck poo in order to keep other producers away from their precious plants. As with most stories in China, it is impossible to know if this is true or not but clearly the villagers failed because now everyone in this area holds Duck Sh*t oolong in very high esteem and for good reason - it is a gorgeous tea.
            - paragraph [ref=f20e247]: Tasting this tea is a delight for the senses. It has warm baked almonds, butter and custard aroma with hints of sweet flowers.
            - paragraph [ref=f20e248]: The tea has a slight sour cherry aroma through the nose which works perfectly with the buttery almond flavour and silky feel of the liquor. We call this the bakewell tart of teas and it would work perfectly with a slice of cake although it is a complete experience drinking alone. The mouthfeel is luscious, generous and yet refreshing.
            - paragraph [ref=f20e249]: To learn more about Dan Cong tea watch this video!
            - paragraph [ref=f20e250]
