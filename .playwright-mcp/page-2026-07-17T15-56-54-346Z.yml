            - generic [ref=f14e537]:
              - heading "Mei Leaf Tasting Notes" [level=2] [ref=f14e538]
              - img "Heirloom Silver Needle Flavour Wheel" [ref=f14e540]
              - generic [ref=f14e541]:
                - term [ref=f14e542]: EYES - DRY LEAF
                - definition [ref=f14e543]: Silver green, furry even buds.
                - term [ref=f14e544]: NOSE - DRY LEAF
                - definition [ref=f14e545]: Malt, nougat and steamed milk pudding.
                - term [ref=f14e546]: NOSE - WET LEAF
                - definition [ref=f14e547]: Sugared almonds, cereal milk, vanilla pudding, fennel tops and lily of the valley.
                - term [ref=f14e548]: EYES - LIQUOR
                - definition [ref=f14e549]: Bright, pale, chartreuse.
                - term [ref=f14e550]: MOUTH - TEXTURE
                - definition [ref=f14e551]: Thick, sticky yet creamy soft liquor.
                - term [ref=f14e552]: MOUTH - TASTE
                - definition [ref=f14e553]: Cooked soya milk, nougat, fresh nettle and warm summer meadows.
                - term [ref=f14e554]: NOSE - EMPTY CUP
                - definition [ref=f14e555]: Malted soya milk.
                - term [ref=f14e556]: MOUTH - FINISH
                - definition [ref=f14e557]: Soft and sticky with a fresh, cooling, almond jelly sweetness.
                - term [ref=f14e558]: EYES - WET LEAF
                - definition [ref=f14e559]: Pistachio green buds with soft sheen.
                - term [ref=f14e560]: BODY SENSATION
                - definition [ref=f14e561]: Settled, calm, and slightly warming.
            - generic [ref=f14e562]:
              - term [ref=f14e563]: SEASON
              - definition [ref=f14e564]: March 2026
              - term [ref=f14e565]: CULTIVAR
              - definition [ref=f14e566]: Da Hao
              - term [ref=f14e567]: ORIGIN
              - definition [ref=f14e568]: Hulin village, Panxi, Fuding, Fujian, China
              - term [ref=f14e569]: PICKING & PROCESSING
              - definition [ref=f14e570]: Buds
              - term [ref=f14e571]: ELEVATION
              - definition [ref=f14e572]: 700m
          - generic [ref=f14e573]:
            - paragraph [ref=f14e574]: THIS IS THE REAL DEAL! Crafted using traditional methods, including sun withering and a secondary charcoal roasting, this tea is the taste of an heirloom Silver Needle.
            - paragraph [ref=f14e575]: We have switched up our source for Heirloom Silver Needle to a producer in the famed village of Panxi. This legendary area is widely regarded as the birthplace of White tea, with a micro-terroir and tea culture which is perfect for the finest White tea cultivation.
            - paragraph [ref=f14e576]: When we visited Panxi, we were so excited to taste the teas, but left disappointed because so many of the producers had switched production to make a more consistent (but kinda boring) tea. Withering was mostly done indoors and controlled by machine and there was no charcoal baking.
            - paragraph [ref=f14e577]: "You can watch the video here:"
            - paragraph [ref=f14e578]:
              - generic [ref=f14e579]: CHINESE WHITE TEA - Everything you need to know (FUJIAN TEA TRIP PART 1)
            - paragraph [ref=f14e581]: So, instead we found a producer in Taimu who made tea the old-school way (more on that method below). We have been buying from that producer for years, and his tea always won out in blind tastings.
            - paragraph [ref=f14e582]: Until this year!
            - paragraph [ref=f14e583]: In our tea tastings, I was smitten by this batch of Silver Needle and was surprised that my favourite tea was not from our producers in Taimu.
            - paragraph [ref=f14e584]: So, this is properly sun-withered and charcoal baked Da Hao Yin Zhen from the most sought-after village on Earth.
            - list [ref=f14e585]:
              - listitem [ref=f14e586]: • This Heirloom silver needle is picked from 65 year-old tea bushes around Panxi. The picking is perfect - fat and furry Da Hao buds.
              - listitem [ref=f14e587]: • The tea is partially sun withered in single layers and then left at body temperature for about 60 hours to develop flavour.
              - listitem [ref=f14e588]: • The Silver Needle is left for a week in a room to release the green aromatics making a warmer and nuttier tea.
              - listitem [ref=f14e589]: • The buds are then baked at about 50 degrees Celsius (120 Fahrenheit) until dry.
              - listitem [ref=f14e590]: • The Silver Needle is then roasted in small batches by hand over charcoal at extremely low temperature (body temperature) for about 6 hours. This concentrates flavour, changes the character and taste of the tea to be warmer, adds thickness and smoothness to the texture and stickiness to the finish. The charcoal baking of tea will improve its ability for ageing.
            - paragraph [ref=f14e591]: This tea is perfection - warm, malty and milky with sugared almonds, fennel tops and warm summer meadows. Thick, soft and rounded with a cooling finish.
            - paragraph [ref=f14e592]: I expected to find out that the price of the Silver Needle was insane - a tradiitionally made Yin Zhen from Panxi would normally command the most ridiculous price tag. So you can imagine my amazement when I found out that the price was less than our Taimu source!
            - paragraph [ref=f14e593]: I genuinely think that maybe they sent us the wrong price becuase I would expect to pay 2-3x the amount for such a special tea.
            - paragraph [ref=f14e594]: But I kept quiet, bought the batch and have passed on the savings to you .
            - paragraph [ref=f14e595]: Enjoy the luxury of the world's greatest White without taking out another mortgage.
            - paragraph [ref=f14e596]: PS Do not expect next year's batch to be priced so low - this is almost certainly one of those unusual moments when a mega-tea is going for a relative steal.
