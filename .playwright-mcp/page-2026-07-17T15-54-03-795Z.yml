              - definition [ref=f3e220]: Da Hao
              - term [ref=f3e221]: ORIGIN
              - definition [ref=f3e222]: Hulin village, Panxi, Fuding, Fujian, China
              - term [ref=f3e223]: PICKING & PROCESSING
              - definition [ref=f3e224]: Buds
